---
- name: Ensure Fulcrum group exists
  ansible.builtin.group:
    name: "{{ fulcrum_group }}"
    system: true

- name: Ensure Fulcrum user exists
  ansible.builtin.user:
    name: "{{ fulcrum_user }}"
    group: "{{ fulcrum_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure Fulcrum config directory exists
  ansible.builtin.file:
    path: "/etc/fulcrum"
    state: directory
    owner: "{{ fulcrum_user }}"
    group: "{{ fulcrum_group }}"
    mode: "0750"

- name: Ensure Fulcrum TLS directory exists
  ansible.builtin.file:
    path: "{{ fulcrum_tls_dir }}"
    state: directory
    owner: root
    group: "{{ fulcrum_group }}"
    mode: "0750"

- name: Ensure Fulcrum data directory exists (Chipnet)
  ansible.builtin.file:
    path: "{{ fulcrum_chipnet_data_dir }}"
    state: directory
    owner: "{{ fulcrum_user }}"
    group: "{{ fulcrum_group }}"
    mode: "0750"

- name: Ensure Fulcrum data directory exists (Mainnet)
  ansible.builtin.file:
    path: "{{ fulcrum_mainnet_data_dir }}"
    state: directory
    owner: "{{ fulcrum_user }}"
    group: "{{ fulcrum_group }}"
    mode: "0750"

# -------------------------------------------------------------------
# TLS (self-signed) - generate on server, store in /etc/fulcrum/tls
# -------------------------------------------------------------------

- name: Generate private key (Chipnet) if missing
  ansible.builtin.command:
    cmd: >-
      openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out {{
      fulcrum_chipnet_ssl_key_path }}
    creates: "{{ fulcrum_chipnet_ssl_key_path }}"

- name: Generate self-signed certificate (Chipnet) if missing
  ansible.builtin.command:
    cmd: >-
      openssl req -new -x509 -sha256 -days 825 -key {{
      fulcrum_chipnet_ssl_key_path }} -out {{ fulcrum_chipnet_ssl_cert_path }}
      -subj "/CN={{ fulcrum_cert_cn }}" -addext "{{ fulcrum_cert_san }}"
    creates: "{{ fulcrum_chipnet_ssl_cert_path }}"
  notify: Restart fulcrum-chipnet

- name: Fix permissions on TLS files (Chipnet)
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: "{{ fulcrum_group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ fulcrum_chipnet_ssl_cert_path }}"
      mode: "0644"
    - path: "{{ fulcrum_chipnet_ssl_key_path }}"
      mode: "0640"
  notify: Restart fulcrum-chipnet

- name: Generate private key (Mainnet) if missing
  ansible.builtin.command:
    cmd: >-
      openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out {{
      fulcrum_mainnet_ssl_key_path }}
    creates: "{{ fulcrum_mainnet_ssl_key_path }}"

- name: Generate self-signed certificate (Mainnet) if missing
  ansible.builtin.command:
    cmd: >-
      openssl req -new -x509 -sha256 -days 825 -key {{
      fulcrum_mainnet_ssl_key_path }} -out {{ fulcrum_mainnet_ssl_cert_path }}
      -subj "/CN={{ fulcrum_cert_cn }}" -addext "{{ fulcrum_cert_san }}"
    creates: "{{ fulcrum_mainnet_ssl_cert_path }}"
  notify: Restart fulcrum-mainnet

- name: Fix permissions on TLS files (Mainnet)
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: "{{ fulcrum_group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ fulcrum_mainnet_ssl_cert_path }}"
      mode: "0644"
    - path: "{{ fulcrum_mainnet_ssl_key_path }}"
      mode: "0640"
  notify: Restart fulcrum-mainnet

# -------------------------------------------------------------------
# Configs + systemd
# -------------------------------------------------------------------

- name: Deploy Fulcrum config (Chipnet)
  ansible.builtin.template:
    src: fulcrum-chipnet.conf.j2
    dest: "{{ fulcrum_chipnet_config_file }}"
    owner: "{{ fulcrum_user }}"
    group: "{{ fulcrum_group }}"
    mode: "0640"
    backup: true
  notify: Restart fulcrum-chipnet

- name: Deploy Fulcrum config (Mainnet)
  ansible.builtin.template:
    src: fulcrum-mainnet.conf.j2
    dest: "{{ fulcrum_mainnet_config_file }}"
    owner: "{{ fulcrum_user }}"
    group: "{{ fulcrum_group }}"
    mode: "0640"
    backup: true
  notify: Restart fulcrum-mainnet

- name: Deploy systemd unit file for Fulcrum (Chipnet)
  ansible.builtin.template:
    src: fulcrum-chipnet.service.j2
    dest: "/etc/systemd/system/{{ fulcrum_chipnet_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd (fulcrum)

- name: Deploy systemd unit file for Fulcrum (Mainnet)
  ansible.builtin.template:
    src: fulcrum-mainnet.service.j2
    dest: "/etc/systemd/system/{{ fulcrum_mainnet_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd (fulcrum)

- name: Ensure Fulcrum Chipnet service is enabled and running
  ansible.builtin.systemd:
    name: "{{ fulcrum_chipnet_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  register: fulcrum_chipnet_result
  ignore_errors: true

- name: Check Fulcrum Chipnet service logs on failure
  ansible.builtin.command:
    cmd: "journalctl -u {{ fulcrum_chipnet_service_name }} -b --no-pager"
  register: fulcrum_chipnet_logs
  when: fulcrum_chipnet_result.failed
  changed_when: false

- name: Report Fulcrum Chipnet service failure
  ansible.builtin.debug:
    msg: |
      Fulcrum Chipnet service failed to start. Logs:
      {{ fulcrum_chipnet_logs.stdout }}
  when: fulcrum_chipnet_result.failed
  failed_when: fulcrum_chipnet_result.failed

- name: Ensure Fulcrum Mainnet service is enabled and running
  ansible.builtin.systemd:
    name: "{{ fulcrum_mainnet_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  register: fulcrum_mainnet_result
  ignore_errors: true

- name: Check Fulcrum Mainnet service logs on failure
  ansible.builtin.command:
    cmd: "journalctl -u {{ fulcrum_mainnet_service_name }} -b --no-pager"
  register: fulcrum_mainnet_logs
  when: fulcrum_mainnet_result.failed
  changed_when: false

- name: Report Fulcrum Mainnet service failure
  ansible.builtin.debug:
    msg: |
      Fulcrum Mainnet service failed to start. Logs:
      {{ fulcrum_mainnet_logs.stdout }}
  when: fulcrum_mainnet_result.failed
  failed_when: fulcrum_mainnet_result.failed

# -------------------------------------------------------------------
# Firewall
# -------------------------------------------------------------------

- name: Open Fulcrum Chipnet ports in UFW (TCP/SSL/WSS)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "{{ fulcrum_chipnet_tcp_port }}"
    - "{{ fulcrum_chipnet_ssl_port }}"
    - "{{ fulcrum_chipnet_wss_port }}"

- name: Open Fulcrum Mainnet ports in UFW (TCP/SSL/WSS)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "{{ fulcrum_mainnet_tcp_port }}"
    - "{{ fulcrum_mainnet_ssl_port }}"
    - "{{ fulcrum_mainnet_wss_port }}"
