---
fulcrum_user: "fulcrum"
fulcrum_group: "fulcrum"

# Service naming
fulcrum_chipnet_service_name: "fulcrum-chipnet"
fulcrum_mainnet_service_name: "fulcrum-mainnet"

# Data + config paths
fulcrum_chipnet_data_dir: "/fulcrum/fulcrum-chipnet-data"
fulcrum_chipnet_config_file: "/etc/fulcrum/fulcrum-chipnet.conf"

fulcrum_mainnet_data_dir: "/fulcrum/fulcrum-mainnet-data"
fulcrum_mainnet_config_file: "/etc/fulcrum/fulcrum-mainnet.conf"

# Bind addresses
fulcrum_tcp_host: "0.0.0.0"
fulcrum_ssl_host: "0.0.0.0"
fulcrum_ws_host: "0.0.0.0"
fulcrum_wss_host: "0.0.0.0"

# Ports (Chipnet)
fulcrum_chipnet_tcp_port: 50001
fulcrum_chipnet_ssl_port: 50002
fulcrum_chipnet_ws_port: 50003
fulcrum_chipnet_wss_port: 50004

# Ports (Mainnet offset to avoid collisions)
fulcrum_mainnet_tcp_port: 51001
fulcrum_mainnet_ssl_port: 51002
fulcrum_mainnet_ws_port: 51003
fulcrum_mainnet_wss_port: 51004

# TLS paths (managed by Ansible tasks)
fulcrum_tls_dir: "/etc/fulcrum/tls"

fulcrum_chipnet_ssl_cert_path: "{{ fulcrum_tls_dir }}/chipnet-cert.pem"
fulcrum_chipnet_ssl_key_path: "{{ fulcrum_tls_dir }}/chipnet-key.pem"

fulcrum_mainnet_ssl_cert_path: "{{ fulcrum_tls_dir }}/mainnet-cert.pem"
fulcrum_mainnet_ssl_key_path: "{{ fulcrum_tls_dir }}/mainnet-key.pem"

# Use a conservative CN; clients can still connect with self-signed after trust.
fulcrum_cert_cn: "{{ ansible_facts['fqdn'] | default(inventory_hostname) }}"

# Keep SAN fairly generic; folded scalars preserve commas well enough.
fulcrum_cert_san: >-
  subjectAltName=DNS:{{ ansible_facts['fqdn'] | default(inventory_hostname) }},
  DNS:{{ inventory_hostname }}, DNS:localhost, IP:127.0.0.1

chipnet_fulcrum_config:
  datadir: "{{ fulcrum_chipnet_data_dir }}"
  bitcoind: "127.0.0.1:{{ chipnet_config.rpcport }}"

  # Always use rpcuser/rpcpassword (avoid cookie under /home + ProtectHome)
  rpccookie: ""
  rpcuser: "{{ chipnet_config.rpcuser }}"
  rpcpassword: "{{ chipnet_config.rpcpassword }}"

  tcp: "{{ fulcrum_tcp_host }}:{{ fulcrum_chipnet_tcp_port }}"
  ssl: "{{ fulcrum_ssl_host }}:{{ fulcrum_chipnet_ssl_port }}"
  ws: "{{ fulcrum_ws_host }}:{{ fulcrum_chipnet_ws_port }}"
  wss: "{{ fulcrum_wss_host }}:{{ fulcrum_chipnet_wss_port }}"

  cert: "{{ fulcrum_chipnet_ssl_cert_path }}"
  key: "{{ fulcrum_chipnet_ssl_key_path }}"

  hostname: ""
  peering: false
  announce: false

  admin: "127.0.0.1:8000"
  stats: "127.0.0.1:8080"

mainnet_fulcrum_config:
  datadir: "{{ fulcrum_mainnet_data_dir }}"
  bitcoind: "127.0.0.1:{{ mainnet_config.rpcport }}"

  rpccookie: ""
  rpcuser: "{{ mainnet_config.rpcuser }}"
  rpcpassword: "{{ mainnet_config.rpcpassword }}"

  tcp: "{{ fulcrum_tcp_host }}:{{ fulcrum_mainnet_tcp_port }}"
  ssl: "{{ fulcrum_ssl_host }}:{{ fulcrum_mainnet_ssl_port }}"
  ws: "{{ fulcrum_ws_host }}:{{ fulcrum_mainnet_ws_port }}"
  wss: "{{ fulcrum_wss_host }}:{{ fulcrum_mainnet_wss_port }}"

  cert: "{{ fulcrum_mainnet_ssl_cert_path }}"
  key: "{{ fulcrum_mainnet_ssl_key_path }}"

  hostname: ""
  peering: false
  announce: false

  admin: "127.0.0.1:8100"
  stats: "127.0.0.1:8180"
